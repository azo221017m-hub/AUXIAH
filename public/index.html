<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AUXIAH – Auxilio Humano con Inteligencia Artificial. Página de cliente especial." />
  <title>AUXIAH – Cliente</title>
  <link rel="stylesheet" href="css/client.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <h1>🆘 AUXIAH</h1>
    <p>Auxilio Humano con Inteligencia Artificial</p>
  </header>

  <!-- ===== Status bar ===== -->
  <div id="status-bar" role="status" aria-live="polite">
    <span id="conn-indicator" aria-hidden="true"></span>
    Conectando…
  </div>

  <!-- ===== Main 3-column grid ===== -->
  <main class="main-grid" role="main">

    <!-- ===================== SECTION 1: Alert type buttons ===================== -->
    <section class="section-card" aria-labelledby="sec1-title">
      <h2 class="section-title" id="sec1-title">1 · Tipo de Ayuda</h2>

      <button id="btn-asistencia" class="btn-alert"
              aria-label="Solicitar Asistencia"
              aria-pressed="false">
        <span class="btn-icon" aria-hidden="true">🆘</span>
        ASISTENCIA
      </button>

      <button id="btn-emergencia" class="btn-alert"
              aria-label="Solicitar Emergencia"
              aria-pressed="false">
        <span class="btn-icon" aria-hidden="true">🚨</span>
        EMERGENCIA
      </button>

      <button id="btn-urgencia" class="btn-alert"
              aria-label="Solicitar Urgencia"
              aria-pressed="false">
        <span class="btn-icon" aria-hidden="true">⚠️</span>
        URGENCIA
      </button>
    </section>

    <!-- ===================== SECTION 2: Geolocation ===================== -->
    <section class="section-card" aria-labelledby="sec2-title">
      <h2 class="section-title" id="sec2-title">2 · Mi Ubicación</h2>

      <button id="btn-location" class="btn-location"
              aria-label="Obtener ubicación actual">
        <span aria-hidden="true">📍</span>
        CLICK PARA OBTENER<br>UBICACIÓN ACTUAL
      </button>

      <div id="location-display" aria-live="polite" role="status">
        📍 Ubicación no capturada
      </div>
    </section>

    <!-- ===================== SECTION 3: Message / Voice ===================== -->
    <section class="section-card" aria-labelledby="sec3-title">
      <h2 class="section-title" id="sec3-title">3 · Mensaje</h2>

      <textarea id="message-area"
                placeholder="Escribe aquí tu mensaje…"
                aria-label="Escribe tu mensaje de ayuda"
                rows="4"></textarea>

      <div class="voice-row">
        <button id="btn-voice" class="btn-voice"
                aria-label="Iniciar grabación de voz por 10 segundos">
          🎙 ESCUCHAR (10s)
        </button>

        <button id="btn-send" class="btn-send"
                aria-label="Enviar solicitud al monitor">
          📤 ENVIAR
        </button>
      </div>

      <div id="voice-countdown" aria-live="assertive" role="status"></div>
    </section>

  </main>

  <!-- ===== Toast notifications ===== -->
  <div id="toast" role="alert" aria-live="assertive"></div>

  <!-- ===== Footer ===== -->
  <footer>
    <a href="monitor.html" target="_blank" style="color:#555;text-decoration:none;">
      🖥 Monitor AUXIAH
    </a>
    &nbsp;|&nbsp;
    AUXIAH © 2024 — Auxilio Humano con Inteligencia Artificial
  </footer>

  <script src="js/client.js"></script>
</body>
</html>
