<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AUXIAH – Monitor de solicitudes de ayuda en tiempo real." />
  <title>Monitor AUXIAH</title>

  <!-- Leaflet CSS (local) -->
  <link rel="stylesheet" href="lib/leaflet.css" />

  <link rel="stylesheet" href="css/monitor.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <h1>🖥 Monitor AUXIAH</h1>
    <div id="monitor-status">
      <span id="conn-indicator" title="Estado de conexión"></span>
      <span id="conn-label">Conectando…</span>
      &nbsp;|&nbsp;
      <span id="notif-badge" class="notif-badge" aria-label="Solicitudes nuevas">0</span>
      solicitudes nuevas
    </div>
  </header>

  <!-- ===== App layout: Map + Sidebar ===== -->
  <div class="app-layout">

    <!-- Map -->
    <div id="map" aria-label="Mapa de solicitudes AUXIAH"></div>

    <!-- Sidebar -->
    <aside class="sidebar" aria-label="Lista de solicitudes">
      <div class="sidebar-header">
        <h2>Solicitudes</h2>
      </div>

      <!-- Filter buttons -->
      <div class="filter-bar" role="group" aria-label="Filtrar por tipo">
        <button class="filter-btn f-all active"        data-filter="ALL"        aria-pressed="true">Todas</button>
        <button class="filter-btn f-asistencia"        data-filter="ASISTENCIA" aria-pressed="false">🆘 Asistencia</button>
        <button class="filter-btn f-emergencia"        data-filter="EMERGENCIA" aria-pressed="false">🚨 Emergencia</button>
        <button class="filter-btn f-urgencia"          data-filter="URGENCIA"   aria-pressed="false">⚠️ Urgencia</button>
      </div>

      <!-- Request list -->
      <div id="request-list" role="list" aria-live="polite" aria-label="Solicitudes activas">
      </div>
    </aside>

  </div>

  <!-- Leaflet JS (local) -->
  <script src="lib/leaflet.js"></script>

  <script src="js/monitor.js"></script>
</body>
</html>
